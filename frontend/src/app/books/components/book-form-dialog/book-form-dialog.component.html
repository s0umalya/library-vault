<h2 mat-dialog-title>
    {{ isEditMode ? 'Edit Book' : 'Add Book' }}
</h2>

<form [formGroup]="form">

    <mat-dialog-content>

        <div class="form-grid">

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Title</mat-label>
                <input
                    matInput
                    formControlName="title"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Author</mat-label>
                <input
                    matInput
                    formControlName="author"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Genre</mat-label>
                <input
                    matInput
                    formControlName="genre"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Publisher</mat-label>
                <input
                    matInput
                    formControlName="publisher"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Language</mat-label>
                <input
                    matInput
                    formControlName="language"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>ISBN</mat-label>
                <input
                    matInput
                    formControlName="isbn"
                    autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Publication Year</mat-label>
                <input
                    matInput
                    type="number"
                    formControlName="publicationYear">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Status</mat-label>

                <mat-select formControlName="status">

                    <mat-option value="Available">
                        Available
                    </mat-option>

                    <mat-option value="Borrowed">
                        Borrowed
                    </mat-option>

                    <mat-option value="Lent">
                        Lent
                    </mat-option>

                    <mat-option value="Lost">
                        Lost
                    </mat-option>

                </mat-select>

            </mat-form-field>

        </div>

    </mat-dialog-content>

    <mat-dialog-actions align="end">

        <button
            mat-button
            type="button"
            (click)="cancel()">

            Cancel

        </button>

        <button
            mat-flat-button
            color="primary"
            type="button"
            [disabled]="form.invalid"
            (click)="save()">

            {{ isEditMode ? 'Update Book' : 'Save Book' }}

        </button>

    </mat-dialog-actions>

</form>
