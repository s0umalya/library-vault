<div class="toolbar">
    <h1>Library Vault</h1>

    <button mat-flat-button color="primary" (click)="openAddBookDialog()">
        Add Book
    </button>
</div>

<mat-form-field appearance="outline">
    <mat-label>Search books</mat-label>

    <input matInput [(ngModel)]="searchText" (input)="filterBooks()">

</mat-form-field>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

    <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
        <td mat-cell *matCellDef="let book" [matTooltip]="book.title">{{ book.title }}</td>
    </ng-container>

    <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Author</th>
        <td mat-cell *matCellDef="let book">{{ book.author }}</td>
    </ng-container>

    <ng-container matColumnDef="genre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Genre</th>
        <td mat-cell *matCellDef="let book">{{ book.genre || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="publisher">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Publisher</th>
        <td mat-cell *matCellDef="let book">{{ book.publisher || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="isbn">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ISBN</th>
        <td mat-cell *matCellDef="let book">{{ book.isbn || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="publicationYear">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Year</th>
        <td mat-cell *matCellDef="let book">{{ book.publicationYear || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let book">
            <span class="status-badge" [ngClass]="book.status.toLowerCase()">

                {{ book.status }}

            </span>
        </td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let book">
            <button mat-icon-button (click)="editBook(book)">
                <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteBook(book)">
                <mat-icon>delete</mat-icon>
            </button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
<mat-paginator
  [pageSize]="10"
  [pageSizeOptions]="[5, 10, 25, 50]"
  showFirstLastButtons>
</mat-paginator>
